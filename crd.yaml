apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: demos.stable.com
spec:
  group: stable.com
  scope: Namespaced
  names:
    plural: demos
    singular: demo
    kind: WebApp
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              image:
                type: string
              port:
                type: integer
              replicas:
                type: integer
    selectableFields:
    - jsonPath: .spec.image
    - jsonPath: .spec.port
    - jsonPath: .spec.replicas
    additionalPrinterColumns:
    - jsonPath: .spec.image
      name: Image
      type: string
    - jsonPath: .spec.port
      name: Port
      type: integer
    - jsonPath: .spec.replicas
      name: Replicas
      type: integer
